# openenv.yaml
# Required by the OpenEnv spec validator.
# This file describes your environment to the Hub.

name: dataoncallenv
version: "2.0.0"
description: >
  RL environment for data pipeline debugging agents. The agent acts as an
  on-call data analyst investigating broken reports — diagnosing root causes
  across three realistic bug scenarios. Features: partial observability
  (tables must be discovered), query cost budgets, realistic dbt/Airflow logs,
  anti-cheat constraints, and tiered evaluation with investigation quality scoring.

domain: data-engineering
author: RLBenchmarkingTeam
entrypoint: api.app:app
tasks:
  - id: 1
    difficulty: easy
    title: "Weekly revenue report shows $0 for international sales"
    description: "Silent NULL JOIN caused by currency code case mismatch"
    optimal_steps: 5
    optimal_cost: 7.0

  - id: 2
    difficulty: medium
    title: "Monthly active users dropped 8% on Feb 1st"
    description: "Timezone migration caused double-counting at month boundary"
    optimal_steps: 7
    optimal_cost: 10.0

  - id: 3
    difficulty: hard
    title: "Cloud Storage revenue overstated by exactly 3.7x"
    description: "Fanout bug from non-unique JOIN key in product_promotions"
    optimal_steps: 8
    optimal_cost: 13.0

observation_space:
  task_id: integer
  result: any
  steps_taken: integer
  done: boolean
  max_steps: integer
  cost_spent: float
  budget_remaining: float

action_space:
  tool: string    # run_sql | inspect_schema | check_logs | check_airflow | diff_report | list_tables | submit
  query: string
  reasoning: string   # optional — rewarded by grader

reward_range: [0.0, 1.0]

reward_components:
  - name: diagnosis_correct
    max: 0.25
    description: "Tiered: exact root cause (0.25), category match (0.15), symptom only (0.08)"
  - name: fix_valid
    max: 0.25
    description: "Agent's proposed fix query returns correct output vs ground truth"
  - name: efficiency
    max: 0.15
    description: "Combined step efficiency + cost efficiency vs optimal"
  - name: reasoning_quality
    max: 0.10
    description: "Fraction of actions that include reasoning field"
  - name: investigation_quality
    max: 0.10
    description: "Logical debugging methodology: discovery → schema → logs → hypothesis → verify"
  - name: false_positive_penalty
    max: -0.15
    description: "Penalty for irrelevant table access, duplicate queries, or memorized answers"

features:
  - partial_observability: "Tables hidden until agent calls list_tables()"
  - query_costs: "Each tool has a fixed cost; total budget 20.0 per episode"
  - realistic_logs: "Expanded dbt logs + Airflow DAG run history with noise entries"
  - anti_cheat: "SELECT * blocked, results capped at 50 rows, min 2 steps before submit"
  - tiered_evaluation: "Diagnosis scored by depth of understanding, not binary"

tags:
  - openenv
  - data-engineering
  - sql
  - debugging
  - real-world
  - agentic
  - partial-observability

endpoints:
  health: GET /health
  reset:  POST /reset
  step:   POST /step
  state:  GET /state
  tasks:  GET /tasks